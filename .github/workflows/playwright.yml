name: Playwright Tests Part 01
 
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies (part1)
        run: |
          cd Part_01
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd Part_01
          npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          cd Part_01
          npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: part1/playwright-report/
          retention-days: 30
